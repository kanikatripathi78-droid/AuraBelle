<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f5f5;
        background-image: url("{{ url_for('static', filename='images/products/background.jpeg') }}");
        background-size: cover;
        background-position: center;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .signup-container {
        background: white;
        padding: 50px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 450px;
    }
    
    .signup-container h2 {
        text-align: center;
        font-size: 36px;
        color: #d4a574;
        margin-bottom: 40px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        font-size: 16px;
        color: #333;
        margin-bottom: 8px;
        font-weight: 500;
    }
    
    .form-group input,
    .form-group select {
        width: 100%;
        padding: 15px;
        border: 2px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
        transition: border-color 0.3s;
        background: white;
    }
    
    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #d4a574;
    }
    
    .btn-signup {
        width: 100%;
        padding: 18px;
        background: #d4a574;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
    }
    
    .btn-signup:hover {
        background: #c49464;
    }
    
    .login-link {
        text-align: center;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #ddd;
    }
    
    .login-link p {
        color: #666;
        font-size: 16px;
    }
    
    .login-link a {
        color: #d4a574;
        text-decoration: none;
        font-weight: 600;
    }
    
    .login-link a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="signup-container">
    <h2>Sign Up</h2>
    {% if signup_error %}
    <p style="background:#fee2e2; color:#991b1b; padding:10px 12px; border-radius:8px; margin-bottom:14px;">
        {{ signup_error }}
    </p>
    {% endif %}
    
    <form method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" placeholder="Enter phone number" required>
        </div>
        
        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" placeholder="Enter your address" required>
        </div>
        
        <div class="form-group">
            <label>City</label>
            <input type="text" name="city" placeholder="Enter city" required>
        </div>
        
        <div class="form-group">
            <label>Pincode</label>
            <input type="text" name="pincode" placeholder="Enter pincode" required>
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <div class="form-group">
            <label>Register As</label>
            <select name="role" required>
                <option value="user" selected>Buyer (User)</option>
                <option value="seller">Seller</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        
        <button type="submit" class="btn-signup">Sign Up</button>
    </form>
    
    <div class="login-link">
        <p>Already exist? <a href="/login">Login</a></p>
    </div>
</div>

</body>
</html>
